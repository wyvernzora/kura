# Repo-wide golangci-lint config. Each Go service's `make lint` runs
# `golangci-lint run ./...` from its own module directory; config
# resolution walks up to this file.
#
# Linter selection per project policy:
#   - govet         standard go vet checks; baseline correctness.
#   - gocritic      opinionated diagnostic + performance + style checks.
#   - cyclop        cyclomatic complexity ceiling per function.
#   - contextcheck  catches functions that should accept ctx but don't.
#   - staticcheck   honnef.co static analysis suite (rolls in stylecheck,
#                   simple, unused).
version: "2"
run:
  # Exclusion path patterns below resolve against the invoking module
  # directory, not this file's directory.
  relative-path-mode: wd
  # Union of every service's test build tags so tagged suites are
  # linted too. Tags with no matching files in a module are inert.
  build-tags:
    - e2e
    - e2e_stub
    - legacy_cli_tests
    - conformance
    - smoke
  modules-download-mode: readonly
  tests: true
linters:
  default: none
  enable:
    - contextcheck
    - cyclop
    - gocritic
    - govet
    - staticcheck
  settings:
    cyclop:
      max-complexity: 15
      package-average: 0
    gocritic:
      disabled-checks:
        - paramTypeCombine
        - commentedOutCode
        - hugeParam
        - rangeValCopy
        - builtinShadow
        - regexpSimplify
        # importShadow flags every variable named after an imported
        # package. v1.x didn't enable it by default; v2 did. The
        # codebase has ~6 hits, all of them deliberate (paths, io,
        # errors, provider) — disabling matches the prior baseline.
        - importShadow
      enabled-tags:
        - diagnostic
        - performance
        - style
    staticcheck:
      # Scope to the SA family (safety analysis) to match the
      # behavior of v1.x's staticcheck, which only ran SA* by
      # default. v2 expanded `all` to include ST* (stylecheck),
      # QF* (quickfix), and S1* (simple) families; those check
      # categories were not enforced before and should not expand
      # this gate's scope. Re-enable them in a follow-up if desired.
      checks:
        - SA*
  exclusions:
    generated: lax
    rules:
      - linters:
          - cyclop
        path: e2e/
      # t.Cleanup closures correctly use a fresh context — the test's
      # ctx is already canceled when cleanup runs.
      - linters:
          - contextcheck
        path: e2e/
      - linters:
          - contextcheck
        path: internal/server/(rest|mcp)/server\.go
      - linters:
          - gocritic
          - govet
          - staticcheck
        path: vendor/
      - linters:
          - cyclop
        path: (.+)_test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
