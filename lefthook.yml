commit-msg:
  commands:
    block-ai-brand:
      run: ./.githooks/block-ai-brand-commit-msg.sh {1}
    check-subject-format:
      run: ./.githooks/check-commit-subject.sh {1}

pre-commit:
  commands:
    gofmt-releases:
      glob: "services/release-indexer/**/*.go"
      run: |
        drift=$(cd services/release-indexer && gofmt -l cmd internal pkg sources)
        if [ -n "$drift" ]; then
          echo "gofmt drift in services/release-indexer:" >&2
          echo "$drift" >&2
          exit 1
        fi
