name: takuhai

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: takuhai
      POSTGRES_USER: takuhai
      POSTGRES_PASSWORD: takuhai
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U takuhai -d takuhai"]
      interval: 2s
      timeout: 5s
      retries: 20

  takuhai:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        VERSION: dev
    environment:
      KURA_RELEASES_DATABASE_URL: postgres://takuhai:takuhai@postgres:5432/takuhai?sslmode=disable
    volumes:
      - ./release-indexer.toml:/etc/kura/release-indexer.toml:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
