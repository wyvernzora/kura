name: takuhai

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: takuhai
      POSTGRES_USER: takuhai
      POSTGRES_PASSWORD: takuhai
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U takuhai -d takuhai"]
      interval: 2s
      timeout: 5s
      retries: 20

  takuhai:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        BUILD_DIR: .
        CMD_PKG: ./cmd/kura-release-indexer
        VERSION: dev
    environment:
      KURA_RELEASES_ADDR: :8080
      KURA_RELEASES_DATABASE_URL: postgres://takuhai:takuhai@postgres:5432/takuhai?sslmode=disable
      KURA_RELEASES_LOG_LEVEL: debug
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  dmhy:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        BUILD_DIR: sources/dmhy
        CMD_PKG: ./cmd/kura-releases-dmhy
        VERSION: dev
    environment:
      KURA_RELEASES_DMHY_ADDR: :8080
      KURA_RELEASES_DMHY_BASE_URL: https://share.dmhy.org
      KURA_RELEASES_DMHY_SORT_ID: "2"
      KURA_RELEASES_DMHY_LOG_LEVEL: debug
    ports:
      - "8081:8080"

  nyaa:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        BUILD_DIR: sources/nyaa
        CMD_PKG: ./cmd/kura-releases-nyaa
        VERSION: dev
    environment:
      KURA_RELEASES_NYAA_ADDR: :8080
      KURA_RELEASES_NYAA_BASE_URL: https://nyaa.si
      KURA_RELEASES_NYAA_CATEGORY: "1_0"
      KURA_RELEASES_NYAA_FILTER: "0"
      KURA_RELEASES_NYAA_LOG_LEVEL: debug
    ports:
      - "8082:8080"
