# golangci-lint config. Replaces the prior gopls-check workflow.
# Run via: make lint  →  golangci-lint run ./...
#
# Linter selection per project policy:
#   - govet         standard go vet checks; baseline correctness.
#   - gocritic      opinionated diagnostic + performance + style checks.
#   - cyclop        cyclomatic complexity ceiling per function.
#   - decorder      enforces declaration ordering inside files.
#   - contextcheck  catches functions that should accept ctx but don't.
#   - staticcheck   honnef.co static analysis suite (rolls in stylecheck,
#                   simple, unused).

run:
  timeout: 5m
  modules-download-mode: readonly
  tests: true
  build-tags:
    - e2e
    - e2e_stub
    - legacy_cli_tests

linters:
  disable-all: true
  enable:
    - govet
    - gocritic
    - cyclop
    - decorder
    - contextcheck
    - staticcheck

linters-settings:
  cyclop:
    # 15 is a relaxed bar that catches the genuinely tangled
    # functions while leaving room for the stage / reconcile
    # state machines that legitimately branch.
    max-complexity: 15
    package-average: 0.0   # no package-level average enforcement
    skip-tests: true       # tests can be branchy without hurting prod

  gocritic:
    enabled-tags:
      - diagnostic
      - performance
      - style
    disabled-checks:
      # paramTypeCombine flags `func f(a string, b string)` →
      # `func f(a, b string)` — ergonomic preference, not a bug.
      - paramTypeCombine
      # commentedOutCode is too noisy on intentional reference
      # commentary in design-heavy packages.
      - commentedOutCode
      # hugeParam fights the workflow.Deps style — kura passes
      # structs (Deps, ShowOptions, ApplyResult) by value to avoid
      # accidental aliasing across goroutines and concurrent
      # mutations. Performance is not the concern here.
      - hugeParam
      # rangeValCopy hits the same pattern: iterating a slice of
      # structs by value is fine when the slice is small + bounded.
      - rangeValCopy
      # builtinShadow flags `max` / `min` as local var names;
      # shadowing the 1.21 builtin inside a tight function is
      # idiomatic enough.
      - builtinShadow
      # regexpSimplify is cosmetic ([0-9] vs \d). Doesn't change
      # semantics; not worth the churn.
      - regexpSimplify

  staticcheck:
    # Default check set is fine; explicit listing avoids drift if
    # upstream renames groups.
    checks:
      - all

  decorder:
    # Skip strict declaration ordering — kura's existing codebase
    # mixes type/const/var freely (e.g. const block before its
    # type), and rewriting hundreds of files for cosmetic order is
    # not worth the churn. Keep init-func-first off (kura packages
    # don't use init heavily) + dec-num off (single-decl-per-block
    # not enforced). Re-enable dec-order-check when convention
    # tightens.
    disable-init-func-first-check: true
    disable-dec-num-check: true
    disable-dec-order-check: true

issues:
  # Surface every finding; we already curate via linter selection.
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-use-default: false

  exclude-rules:
    # Cyclop on _test.go is already off via skip-tests, but the
    # script-driven harness in e2e/ has very long command tables
    # that aren't real complexity — keep them off too.
    - path: e2e/
      linters:
        - cyclop

    # Graceful HTTP shutdown intentionally derives a fresh
    # context.Background()-rooted ctx because the inherited ctx
    # is already cancelled. contextcheck flags this as a foot-
    # gun, but it's the standard pattern for net/http.Server.
    # //nolint pragmas don't suppress contextcheck reliably, so
    # exclude by path.
    - path: internal/server/(rest|mcp)/server\.go
      linters:
        - contextcheck

    # Generated / vendored / examples shouldn't gate CI on style.
    - path: vendor/
      linters:
        - staticcheck
        - gocritic
        - govet
