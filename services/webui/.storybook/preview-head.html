<!--
  Mirrors index.html font wiring so Storybook renders the same way the
  real app does. Without this Inter/JetBrains Mono fall back to system
  sans/mono and the Material Symbols ligature names render as plain
  text instead of glyphs.
-->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap"
  rel="stylesheet"
/>
<link
  href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap"
  rel="stylesheet"
/>
