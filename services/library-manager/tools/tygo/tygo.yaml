packages:
  - path: "github.com/wyvernzora/kura/services/library-manager/pkg/api"
    output_path: "../../../webui/src/api/types.gen.ts"
    exclude_files:
      - "vocab.go"
    type_mappings:
      "time.Time": "string"
      "*time.Time": "string"
      "refs.Metadata": "string"
      "refs.Series": "string"
      "refs.Episode": "string"
      "json.RawMessage": "unknown"
      "*json.RawMessage": "unknown"
      "coord.Holder": "{ op: string; token?: string; pid: number; host: string; started: string }"
      "*coord.Holder": "{ op: string; token?: string; pid: number; host: string; started: string }"
      # Narrow string enums to literal unions. Tygo otherwise emits
      # `export type X = string`, which loses type-checking on values.
      # The const declarations below each alias will then resolve to
      # the literal type automatically.
      "ListStatus": '"untracked" | "complete" | "incomplete" | "airing" | "error"'
      "Status": '"pending" | "missing" | "present" | "staged" | "staged_replacement"'
      "ScanStatus": '"added" | "updated" | "unchanged" | "removed"'
    frontmatter: |
      // Code generated by tygo from pkg/api. DO NOT EDIT.
      // Run `make gen-ts` (or `go tool tygo generate -c tools/tygo/tygo.yaml`) to regenerate.
