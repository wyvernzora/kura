<!doctype html>
<html lang="en" data-k-theme="paper">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kura</title>
    <!--
      Sync the saved theme to data-k-theme before the first paint so
      the page doesn't flash the wrong palette while React rehydrates
      the zustand store. Reads the same localStorage key the store
      writes to (zustand persist serializes as { state, version }).
      `theme` is one of 'light' | 'dark' | 'system' (with legacy
      'paper' from v0 stores treated as 'light'). System mode reads
      `prefers-color-scheme` so first paint matches the OS palette.
    -->
    <script>
      (function () {
        function resolve(theme) {
          if (theme === 'dark') return 'dark';
          if (theme === 'light' || theme === 'paper') return 'paper';
          if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            return 'dark';
          }
          return 'paper';
        }
        try {
          var raw = localStorage.getItem('kura.theme');
          var theme = 'system';
          if (raw) {
            var parsed = JSON.parse(raw);
            if (parsed && parsed.state && parsed.state.theme) {
              theme = parsed.state.theme;
            }
          }
          document.documentElement.dataset.kTheme = resolve(theme);
        } catch (e) {
          /* ignore parse / storage errors */
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <!--
      Material Symbols (Outlined) — single icon font used by the
      MaterialIcon helper. Optical-size axis ('opsz') is fixed to 24
      so glyph metrics match the 18 / 20 px renders we use; weight 400
      and grade 0 keep them visually paired with Inter. Variable font
      so we pay one ~30 KB request for every icon name in the family.
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap"
      rel="stylesheet"
    />
    <script type="module" crossorigin src="/assets/index-D0mpl-O5.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-BNUf0bQQ.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
