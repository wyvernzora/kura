# air config for the combined dev container. Watches /src/internal/
# and /src/cmd/ for .go changes; rebuilds with $BUILD_TAGS, restarts
# kura via run-kura.sh which assembles the right serve args (REST +
# MCP HTTP).
#
# Polling is on because macOS bind mounts don't deliver inotify
# events reliably to Linux containers; CPU cost is negligible at
# the chosen interval.

root = "/src"
tmp_dir = "/src/tmp"
testdata_dir = "testdata"

[build]
  # BUILD_TAGS is set by entrypoint.sh from KURA_DEV_STUBS. Empty
  # string is fine — `go build -tags=` (with empty value) is a
  # valid no-op.
  cmd = "go build -tags=${BUILD_TAGS} -o /src/tmp/kura ./cmd/kura"
  bin = "/usr/local/bin/run-kura.sh"
  delay = 200
  poll = true
  poll_interval = 500
  send_interrupt = true
  kill_delay = 5000
  stop_on_error = true
  log = "build-errors.log"
  include_ext = ["go"]
  include_dir = ["cmd", "internal"]
  exclude_dir = ["bin", "tmp", "testdata", ".git", "scratch", "e2e", "tools"]
  exclude_file = []
  exclude_regex = ["_test\\.go$"]
  exclude_unchanged = true
  follow_symlink = false

[log]
  time = true
  main_only = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"
  app = ""

[misc]
  clean_on_exit = true
