name: ci-webui

on:
  push:
    branches: [main]
    paths:
      - "services/webui/**"
      - ".github/workflows/ci-webui.yml"
  pull_request:
    paths:
      - "services/webui/**"
      - ".github/workflows/ci-webui.yml"

concurrency:
  group: ci-webui-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  web:
    name: web
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: services/webui
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          package_json_file: services/webui/package.json

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: services/webui/pnpm-lock.yaml

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      # Build first: the router plugin emits routeTree.gen.ts, which
      # typecheck imports; the file is gitignored.
      - name: build
        run: pnpm build

      - name: lint
        run: pnpm lint

      - name: typecheck
        run: pnpm typecheck

      - name: test
        run: pnpm test

  # :dev image publish, gated on the test job.
  build-push:
    name: build & push
    needs: [web]
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Determine VERSION
        id: version
        run: |
          echo "value=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags + labels
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ghcr.io/wyvernzora/kura-webui
          tags: |
            type=raw,value=dev
          labels: |
            org.opencontainers.image.title=kura-webui
            org.opencontainers.image.description=Kura suite web UI (SPA + Caddy proxy)
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.value }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT

      - name: Build & push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: services/webui
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha,scope=webui
          cache-to: type=gha,mode=max,scope=webui
          provenance: false
