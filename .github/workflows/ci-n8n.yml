name: ci-n8n

on:
  push:
    branches: [main]
    paths:
      - "integrations/n8n/**"
      - "services/library-manager/docs/assets/logo-n8n.svg"
      - ".github/workflows/ci-n8n.yml"
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "integrations/n8n/**"
      - "services/library-manager/docs/assets/logo-n8n.svg"
      - ".github/workflows/ci-n8n.yml"

concurrency:
  group: ci-n8n-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/wyvernzora/kura/n8n-nodes

jobs:
  build:
    name: build
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: integrations/n8n
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: pnpm install
        run: |
          corepack enable
          corepack pnpm install --frozen-lockfile

      - name: typecheck
        run: corepack pnpm typecheck

      - name: build
        run: corepack pnpm build

      - name: test
        run: corepack pnpm test

  # :dev image publish, gated on the build job.
  build-push:
    name: build & push
    needs: [build]
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Determine VERSION
        id: version
        run: |
          echo "value=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags + labels
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=dev
          labels: |
            org.opencontainers.image.title=kura-n8n-nodes
            org.opencontainers.image.description=Kura suite custom nodes for n8n (init container)
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.value }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT

      - name: Build & push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: integrations/n8n/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha,scope=n8n-nodes
          cache-to: type=gha,mode=max,scope=n8n-nodes
          provenance: false

  cleanup-untagged:
    name: prune untagged
    needs: build-push
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    steps:
      - name: Delete untagged versions, keep last 10
        uses: actions/delete-package-versions@e5bc658cc4c965c472efe991f8beea3981499c55 # v5
        with:
          package-name: kura/n8n-nodes
          package-type: container
          delete-only-untagged-versions: 'true'
          min-versions-to-keep: 10
