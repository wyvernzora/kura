name: release

# Repo-wide versioning: one v* tag releases every service image at that
# version. Replaces the per-repo release workflows.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.6.0"
        required: true
        type: string

permissions:
  actions: read
  contents: write
  packages: write

jobs:
  verify:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      sha: ${{ steps.verify.outputs.sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          if [[ ! "$version" =~ ^v[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
            echo "version must look like v0.6.0, got $version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      # Path-filtered service CI runs may legitimately not exist for a
      # given commit, so the release gate checks (a) the tag is on main
      # and (b) ci-lint.yml — which runs for every push — succeeded.
      - name: Verify release commit is on main with passing CI
        id: verify
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git fetch --force --no-tags origin \
            "+refs/tags/$VERSION:refs/tags/$VERSION" \
            +refs/heads/main:refs/remotes/origin/main

          tagged_sha="$(git rev-parse "$VERSION^{commit}")"
          echo "sha=$tagged_sha" >> "$GITHUB_OUTPUT"
          if ! git merge-base --is-ancestor "$tagged_sha" origin/main; then
            echo "::error::Release tag $VERSION points to $tagged_sha, which is not reachable from origin/main."
            exit 1
          fi

          ci_run_url="$(
            gh api "repos/$REPOSITORY/actions/workflows/ci-lint.yml/runs" \
              --method GET \
              -f branch=main \
              -f event=push \
              -f head_sha="$tagged_sha" \
              -f status=completed \
              --jq '.workflow_runs[] | select(.conclusion == "success") | .html_url' |
              head -n 1
          )"
          if [ -z "$ci_run_url" ]; then
            echo "::error::Release commit $tagged_sha does not have a successful ci-lint.yml push run on main."
            exit 1
          fi

          echo "Release commit $tagged_sha is on main and passed CI: $ci_run_url"

  publish-library:
    needs: verify
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.verify.outputs.sha }}

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags + labels
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ghcr.io/wyvernzora/kura/library-manager
          tags: |
            type=raw,value=${{ needs.verify.outputs.version }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=kura-server
            org.opencontainers.image.description=Anime-first library manager
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.verify.outputs.version }}
            org.opencontainers.image.revision=${{ needs.verify.outputs.sha }}
            org.opencontainers.image.licenses=MIT

      - name: Build & push image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: services/library-manager
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.verify.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Compute n8n node tags + labels
        id: n8n-meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ghcr.io/wyvernzora/kura-n8n-nodes
          tags: |
            type=raw,value=${{ needs.verify.outputs.version }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=kura-n8n-nodes
            org.opencontainers.image.description=Kura custom nodes for n8n
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.verify.outputs.version }}
            org.opencontainers.image.revision=${{ needs.verify.outputs.sha }}
            org.opencontainers.image.licenses=MIT

      - name: Build & push n8n nodes
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: integrations/n8n/kura/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.n8n-meta.outputs.tags }}
          labels: ${{ steps.n8n-meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.verify.outputs.version }}
          cache-from: type=gha,scope=release-n8n-nodes
          cache-to: type=gha,mode=max,scope=release-n8n-nodes
          provenance: false

  publish-webui:
    needs: verify
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.verify.outputs.sha }}

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags + labels
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ghcr.io/wyvernzora/kura/webui
          tags: |
            type=raw,value=${{ needs.verify.outputs.version }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=kura-webui
            org.opencontainers.image.description=Kura suite web UI (SPA + Caddy proxy)
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.verify.outputs.version }}
            org.opencontainers.image.revision=${{ needs.verify.outputs.sha }}
            org.opencontainers.image.licenses=MIT

      - name: Build & push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: services/webui
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.verify.outputs.version }}
          cache-from: type=gha,scope=release-webui
          cache-to: type=gha,mode=max,scope=release-webui
          provenance: false

  publish-releases:
    needs: verify
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: kura-release-indexer
            image: ghcr.io/wyvernzora/kura/release-indexer
            context: services/release-indexer
            file: services/release-indexer/Dockerfile
            build_args: ''
            description: Anime release indexer, source crawlers, and match work queue
          - component: kura-releases-n8n-nodes
            image: ghcr.io/wyvernzora/kura-releases-n8n-nodes
            context: .
            file: integrations/n8n/releases/Dockerfile
            build_args: ''
            description: Release-indexer custom nodes for n8n (init container)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.verify.outputs.sha }}

      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags + labels
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=${{ needs.verify.outputs.version }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=${{ matrix.component }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.verify.outputs.version }}
            org.opencontainers.image.revision=${{ needs.verify.outputs.sha }}
            org.opencontainers.image.licenses=MIT

      - name: Build & push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.verify.outputs.version }}
            COMMIT=${{ needs.verify.outputs.sha }}
            ${{ matrix.build_args }}
          cache-from: type=gha,scope=release-${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=release-${{ matrix.component }}
          provenance: false

  github-release:
    needs: [verify, publish-library, publish-webui, publish-releases]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "GitHub release $VERSION already exists."
            exit 0
          fi

          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes \
            --verify-tag
