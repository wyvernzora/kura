name: ci

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

# Cancel superseded runs on PRs and main-branch pushes; never cancel a
# tag release (a half-pushed manifest list leaves the registry in a
# confusing state).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  go:
    name: go
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      # gofmt drift check. The Makefile `fmt` target rewrites in place,
      # which would silently auto-fix CI runs; here we use `-l` to list
      # offenders without mutation and fail when the list is non-empty.
      - name: gofmt
        run: |
          drift=$(gofmt -l cmd internal)
          if [ -n "$drift" ]; then
            echo "::error::gofmt drift in:" >&2
            echo "$drift" >&2
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      # Pinned to match the version used locally; avoids CI-only failures
      # when a newer lint release surfaces issues no developer has hit yet.
      # Bump intentionally with the local install.
      #
      # install-mode=goinstall compiles golangci-lint from source against
      # the Go toolchain `setup-go` just installed. The default `binary`
      # mode downloads the upstream prebuilt binary, which is built with
      # an older Go (v1.64.8 ships built with go1.24); when the project's
      # go.mod targets a newer Go than that, golangci-lint refuses to
      # load the config with "Go language version used to build
      # golangci-lint is lower than the targeted Go version". Building
      # from source side-steps the check.
      - name: golangci-lint
        uses: golangci/golangci-lint-action@55c2c1448f86e01eaae002a5a3a9624417608d84 # v6
        with:
          version: v1.64.8
          install-mode: goinstall

      # -race catches data races; -count=1 disables test caching so a green
      # CI run reflects an actual execution, not a stale cached pass.
      - name: go test
        run: go test -race -count=1 ./...

      - name: go build
        run: go build -trimpath -o bin/kura ./cmd/kura

  web:
    name: web
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # No `version` field — pnpm/action-setup reads the version pinned
      # in web/package.json#packageManager (currently pnpm@10.33.4). The
      # action defaults to ./package.json at the repo root, which has no
      # packageManager field; point it at the web sub-directory's manifest.
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          package_json_file: web/package.json

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      # Build first: the TanStack Router Vite plugin emits
      # src/routeTree.gen.ts as a side effect, which typecheck (tsc -b)
      # imports from src/main.tsx. The file is gitignored, so a fresh
      # CI checkout has no copy and `tsc` fails with TS2307 if build
      # hasn't run. Build also validates the production bundle.
      - name: build
        run: pnpm build

      - name: lint
        run: pnpm lint

      - name: typecheck
        run: pnpm typecheck

      - name: test
        run: pnpm test

  # End-to-end scenarios under e2e/ exercise the CLI surface against a
  # stub provider (kura built with -tags=e2e_stub) so the run is fully
  # hermetic — no docker, no network, no real media. Catches workflow
  # regressions (stage → plan → apply → trash chains) that unit tests
  # don't cover. Gated by build-push so a red e2e run can't ship an
  # image. Renovate dependency bumps surface here at PR time before
  # the merge that would publish a broken :dev image.
  e2e:
    name: e2e
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      # Bumped to 300s vs the local Makefile's 120s — race-mode CI is
      # slower than dev machines, and the suite cold-builds the
      # kura-e2e binary once before any test runs.
      - name: e2e
        run: go test -tags=e2e -race -count=1 -timeout=300s ./e2e/...

  # Regenerate web/src/api/types.gen.ts from internal/response and fail
  # the build if the working tree drifts. Mirrors `make check-gen`. Runs
  # on its own job so a Go-only change can't slip a stale types.gen.ts
  # through the web job (which doesn't regenerate, only typechecks).
  gen-check:
    name: gen-ts drift
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          package_json_file: web/package.json

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: pnpm install (for biome)
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: regenerate types
        run: make gen-ts

      - name: assert no drift
        run: |
          if ! git diff --exit-code -- web/src/api/types.gen.ts; then
            echo "::error::web/src/api/types.gen.ts is stale; run 'make gen-ts' and commit the result" >&2
            exit 1
          fi

  # Build & push the container image to GHCR. Gated on every test job
  # so a red main commit can't ship a poisoned :dev tag and a red tag
  # commit can't move :latest. Pull-request events skip this entirely
  # (no push, no permission to GHCR from forks).
  #
  # Tag rules:
  #   push to main         → :dev (and VERSION=dev-<short_sha>)
  #   push tag vX.Y.Z      → :vX.Y.Z + :latest (VERSION=vX.Y.Z)
  build-push:
    name: build & push
    needs: [go, web, gen-check, e2e]
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # VERSION drives the -ldflags="-X main.Version=..." stamp baked
      # into the kura binary. Tag pushes use the literal tag (e.g.
      # v0.1.0); main-branch pushes use the short SHA prefixed with
      # "dev-" so /api/v1/health on a :dev image still reports the
      # exact commit it came from.
      - name: Determine VERSION
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "value=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      # QEMU enables linux/arm64 emulation on the amd64 GH-hosted
      # runner. Slower than native arm64 but keeps the workflow on
      # free-tier runners.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.title=kura
            org.opencontainers.image.description=Anime-first library manager
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.value }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  # Prune untagged GHCR image versions accumulated by repeated :dev /
  # :latest moves. Each manifest-list push leaves the prior digest
  # intact-but-untagged; without a sweep the package keeps growing.
  # Only untagged versions are eligible; named tags (:dev, :latest,
  # :vX.Y.Z) are never touched.
  cleanup-untagged:
    name: prune untagged
    needs: build-push
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    steps:
      - name: Delete untagged versions, keep last 10
        uses: actions/delete-package-versions@e5bc658cc4c965c472efe991f8beea3981499c55 # v5
        with:
          package-name: kura
          package-type: container
          delete-only-untagged-versions: 'true'
          min-versions-to-keep: 10
