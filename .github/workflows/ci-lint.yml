name: ci-lint

# Commit-subject lint for the whole monorepo. No paths filter: this is the
# one workflow that runs on every push/PR, so release verification can rely
# on it existing for any commit.

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, edited]

concurrency:
  group: ci-lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  commit-subject:
    name: commit subject
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Validate pull request title
        if: github.event_name == 'pull_request'
        env:
          SUBJECT: ${{ github.event.pull_request.title }}
        run: printf '%s\n' "$SUBJECT" | ./.githooks/check-commit-subject.sh -

      - name: Validate pushed commits
        if: github.event_name == 'push'
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] ||
             ! git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
            commits="$AFTER"
          else
            commits="$(git rev-list --reverse "$BEFORE..$AFTER")"
          fi

          for commit in $commits; do
            subject="$(git show -s --format=%s "$commit")"
            if ! printf '%s\n' "$subject" | ./.githooks/check-commit-subject.sh -; then
              echo "::error::Commit $commit has an invalid subject: $subject"
              exit 1
            fi
          done
