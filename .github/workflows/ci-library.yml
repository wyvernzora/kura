name: ci-library

on:
  push:
    branches: [main]
    paths:
      - "services/library-manager/**"
      - "integrations/n8n/kura/**"
      - "services/webui/src/api/types.gen.ts"
      - ".github/workflows/ci-library.yml"
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "services/library-manager/**"
      - "integrations/n8n/kura/**"
      - "services/webui/src/api/types.gen.ts"
      - ".github/workflows/ci-library.yml"

concurrency:
  group: ci-library-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/wyvernzora/kura-server

jobs:
  go:
    name: go
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: services/library-manager
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: services/library-manager/go.mod
          cache: true

      # gofmt drift check: -l lists offenders without mutation.
      - name: gofmt
        run: |
          drift=$(gofmt -l cmd internal)
          if [ -n "$drift" ]; then
            echo "::error::gofmt drift in:" >&2
            echo "$drift" >&2
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      # install-mode=goinstall compiles golangci-lint against the toolchain
      # setup-go installed; pinned to match the local version.
      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9
        with:
          version: v2.12.2
          install-mode: goinstall
          working-directory: services/library-manager

      - name: go test
        run: go test -race -count=1 ./...

      - name: go build
        run: go build -trimpath -o bin/kura-library-manager ./cmd/kura-library-manager

  # Hermetic CLI e2e scenarios against the stub provider (-tags=e2e_stub).
  e2e:
    name: e2e
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: services/library-manager
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: services/library-manager/go.mod
          cache: true

      - name: e2e
        run: go test -tags=e2e -race -count=1 -timeout=300s ./e2e/...

  # Regenerate web/src/api/types.gen.ts and fail on drift.
  gen-check:
    name: gen-ts drift
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: services/library-manager/go.mod
          cache: true

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          package_json_file: services/webui/package.json

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: services/webui/pnpm-lock.yaml

      - name: pnpm install (for biome)
        working-directory: services/webui
        run: pnpm install --frozen-lockfile

      - name: regenerate types
        run: make -C services/library-manager gen-ts

      - name: assert no drift
        run: |
          if ! git diff --exit-code -- services/webui/src/api/types.gen.ts; then
            echo "::error::types.gen.ts is stale; run 'make -C services/library-manager gen-ts' and commit" >&2
            exit 1
          fi

  n8n:
    name: n8n
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: integrations/n8n/kura
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: pnpm install
        run: |
          corepack enable
          corepack pnpm install --frozen-lockfile

      - name: typecheck
        run: corepack pnpm typecheck

      - name: build
        run: corepack pnpm build

      - name: test
        run: corepack pnpm test

  # :dev image publish, gated on every test job.
  build-push:
    name: build & push
    needs: [go, gen-check, e2e, n8n]
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Determine VERSION
        id: version
        run: |
          echo "value=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags + labels
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=dev
          labels: |
            org.opencontainers.image.title=kura-server
            org.opencontainers.image.description=Anime-first library manager
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.value }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT

      - name: Build & push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: services/library-manager
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Compute n8n node tags + labels
        id: n8n-meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ghcr.io/wyvernzora/kura-n8n-nodes
          tags: |
            type=raw,value=dev
          labels: |
            org.opencontainers.image.title=kura-n8n-nodes
            org.opencontainers.image.description=Kura custom nodes for n8n
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.value }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT

      - name: Build & push n8n nodes
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: integrations/n8n/kura/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.n8n-meta.outputs.tags }}
          labels: ${{ steps.n8n-meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha,scope=n8n-nodes
          cache-to: type=gha,mode=max,scope=n8n-nodes
          provenance: false
